<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Free Tools — коллекция бесплатных онлайн-инструментов</title>
    <meta name="description" content="Бесплатные инструменты для офиса, дизайна, AI и разработки. Работают в РФ без VPN.">
    <meta name="author" content="Maksim-124">
    
    <meta property="og:title" content="Free Tools — бесплатные онлайн-инструменты">
    <meta property="og:description" content="Коллекция лучших бесплатных сервисов">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://free-tools.ru">
    
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="container header-container">
            <div class="logo-area">
                <h1 class="logo">🛠️ free<span class="logo-light">-tools</span></h1>
                <p class="tagline">Бесплатные инструменты для работы и творчества</p>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
                <div class="theme-toggle-slider">
                    <span class="theme-icon-light">☀️</span>
                    <span class="theme-icon-dark">🌙</span>
                    <div class="theme-toggle-thumb"></div>
                </div>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="controls">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию или описанию...">
                    <span class="search-icon">🔍</span>
                </div>

                <!-- Только категории, без надписи -->
                <div class="categories-scroll" id="categoryFilters">
                    <!-- Категории будут добавлены через JS -->
                </div>
            </div>

            <div class="stats" id="stats">📊 Загрузка...</div>

            <div class="loader" id="loader" style="display: none;">
                <div class="spinner"></div>
            </div>

            <div class="tools-grid" id="toolsGrid"></div>
        </div>
    </main>

    <div class="modal" id="modal">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <button class="modal-close" aria-label="Закрыть">✕</button>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2025 free-tools.ru — коллекция бесплатных онлайн-инструментов</p>
        </div>
    </footer>
</div>

<script src="scripts.js"></script>
</body>
</html>
